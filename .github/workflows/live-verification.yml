name: Live Verification

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: Public site URL to verify
        required: true
        default: https://www.gwparish.org.au
        type: string

permissions:
  contents: read

jobs:
  verify-live-site:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PLAYWRIGHT_BASE_URL: ${{ inputs.base_url }}
      PLAYWRIGHT_SKIP_WEBSERVER: "1"
      LIGHTHOUSE_BASE_URL: ${{ inputs.base_url }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run live Playwright verification
        run: npm run test:e2e:live

      - name: Run live Lighthouse verification
        run: npm run verify:lighthouse:live

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: live-playwright-report
          path: playwright-report/
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload Playwright test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: live-playwright-test-results
          path: test-results/
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload Lighthouse reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-reports
          path: output/lighthouse/
          if-no-files-found: ignore
          retention-days: 7
