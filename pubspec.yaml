name: gw_parish_website
description: "Greenacres Walkerville Catholic Parish Flutter Web prototype."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  collection: ^1.19.1
  sentry_flutter: ^9.1.0
  wakelock_plus: ^1.3.2
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.2.1
  flutter_staggered_grid_view: ^0.7.0
  go_router: ^16.2.0
  google_fonts: ^6.3.1
  http: ^1.3.0
  intl: ^0.20.2
  just_audio: ^0.9.46
  pdf: ^3.11.3
  printing: ^5.14.2
  shared_preferences: ^2.5.3
  timezone: ^0.10.1
  url_launcher: ^6.3.2
  web: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - assets/data/
    - assets/images/source/
    - assets/images/refurbishment/
